name: CI

on:
  push:
  pull_request:

jobs:
  unix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: bash -n scripts/install.sh
      - name: Check jq availability
        run: jq --version
      - name: Test skill structure
        run: bash tests/test-skill-structure.sh
      - name: Test registry helpers
        run: bash tests/test-lib-registry.sh
      - name: Test plugin manifest
        run: bash tests/test-plugin-manifest.sh
      - name: Test derived file sync
        run: bash tests/test-sync-derived-files.sh
      - name: Test name consistency
        run: bash tests/test-name-consistency.sh
      - name: Test offline Bash installer
        run: bash tests/test-install.sh
      - name: Test upstream references
        run: bash tests/test-upstream-references.sh

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show PowerShell installer help
        shell: pwsh
        run: ./scripts/install.ps1 -Help
      - name: Test offline PowerShell installer
        shell: pwsh
        run: ./tests/test-install.ps1
